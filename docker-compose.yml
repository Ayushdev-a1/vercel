version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: vercel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vercel_clone
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: vercel-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Server
  api-server:
    build:
      context: ./api-server
      dockerfile: Dockerfile
    container_name: vercel-api
    ports:
      - "9000:9000"
      - "9002:9002"
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: vercel_clone
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # AWS (set these manually or use aws credentials from host)
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      # ECS
      ECS_CLUSTER: vercel-cluster
      ECS_TASK: vercel-builder
      # Preview Domain
      PREVIEW_DOMAIN: localhost:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vercel-network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend-nextjs
      dockerfile: Dockerfile
    container_name: vercel-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:9002
    depends_on:
      - api-server
    networks:
      - vercel-network

  # S3 Reverse Proxy
  s3-proxy:
    build:
      context: ./s3-reverse-proxy
      dockerfile: Dockerfile
    container_name: vercel-proxy
    ports:
      - "8000:8000"
    environment:
      AWS_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET: vercel-clone-outputs
    networks:
      - vercel-network

volumes:
  postgres_data:

networks:
  vercel-network:
    driver: bridge
